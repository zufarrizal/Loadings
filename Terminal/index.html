<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20 Terminal CLI Loaders</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="scene">
    <h1>Terminal / CLI Loading Set (20)</h1>
    <section class="grid">
      <article class="item"><div class="loader prompt-dots"><span></span><span></span><span></span></div><h2>Prompt Dots</h2></article>
      <article class="item"><div class="loader spinner-slash"><span></span></div><h2>Spinner Slash</h2></article>
      <article class="item"><div class="loader type-block"><span></span></div><h2>Type Block</h2></article>
      <article class="item"><div class="loader pipe-wave"><span></span><span></span><span></span><span></span><span></span></div><h2>Pipe Wave</h2></article>
      <article class="item"><div class="loader bracket-fill"><span></span></div><h2>Bracket Fill</h2></article>
      <article class="item"><div class="loader command-rain"><span></span><span></span><span></span><span></span></div><h2>Command Rain</h2></article>
      <article class="item"><div class="loader ping-lines"><span></span><span></span><span></span><span></span></div><h2>Ping Lines</h2></article>
      <article class="item"><div class="loader hash-grid"><span></span><span></span><span></span><span></span></div><h2>Hash Grid</h2></article>
      <article class="item"><div class="loader shell-bounce"><span></span><span></span><span></span><span></span></div><h2>Shell Bounce</h2></article>
      <article class="item"><div class="loader caret-jump"><span></span></div><h2>Caret Jump</h2></article>
      <article class="item"><div class="loader percent-loop"><span></span></div><h2>Percent Loop</h2></article>
      <article class="item"><div class="loader packet-trace"><span></span><span></span><span></span><span></span><span></span></div><h2>Packet Trace</h2></article>
      <article class="item"><div class="loader scan-column"><span></span></div><h2>Scan Column</h2></article>
      <article class="item"><div class="loader binary-ticks"><span></span><span></span><span></span><span></span><span></span><span></span></div><h2>Binary Ticks</h2></article>
      <article class="item"><div class="loader route-hops"><span></span><span></span><span></span><span></span></div><h2>Route Hops</h2></article>
      <article class="item"><div class="loader stack-bars"><span></span><span></span><span></span><span></span><span></span></div><h2>Stack Bars</h2></article>
      <article class="item"><div class="loader log-flash"><span></span><span></span><span></span></div><h2>Log Flash</h2></article>
      <article class="item"><div class="loader queue-cells"><span></span><span></span><span></span><span></span><span></span></div><h2>Queue Cells</h2></article>
      <article class="item"><div class="loader port-scan"><span></span><span></span><span></span><span></span></div><h2>Port Scan</h2></article>
      <article class="item"><div class="loader cli-tunnel"><span></span><span></span><span></span></div><h2>CLI Tunnel</h2></article>
    </section>
  </main>
</body>
</html>
